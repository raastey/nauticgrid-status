<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>NauticGrid Status</title>
    <style>
      :root {
        --bg: #0b1220;
        --card: #121b2e;
        --text: #d9e2f2;
        --muted: #8ca0c1;
        --ok: #10b981;
        --warn: #f59e0b;
        --bad: #ef4444;
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        font-family: Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: var(--bg);
        color: var(--text);
      }
      .wrap { max-width: 920px; margin: 0 auto; padding: 28px 16px 56px; }
      .top { margin-bottom: 20px; }
      h1 { margin: 0 0 8px; font-size: 32px; }
      .muted { color: var(--muted); font-size: 14px; }
      .badge {
        display: inline-block; margin-top: 10px; padding: 6px 10px; border-radius: 999px;
        font-size: 12px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.05em;
      }
      .operational { background: rgba(16, 185, 129, 0.16); color: var(--ok); }
      .degraded { background: rgba(245, 158, 11, 0.16); color: var(--warn); }
      .down { background: rgba(239, 68, 68, 0.16); color: var(--bad); }
      .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(240px, 1fr)); gap: 12px; margin-top: 18px; }
      .card { background: var(--card); border: 1px solid #22314e; border-radius: 12px; padding: 12px; }
      .row { display: flex; justify-content: space-between; align-items: center; gap: 8px; }
      .dot { width: 9px; height: 9px; border-radius: 999px; display: inline-block; margin-right: 6px; }
      .dot-operational { background: var(--ok); }
      .dot-degraded { background: var(--warn); }
      .dot-down { background: var(--bad); }
      .incidents { margin-top: 22px; }
      .incident { background: var(--card); border: 1px solid #22314e; border-radius: 12px; padding: 12px; margin-bottom: 10px; }
      .incident h3 { margin: 0 0 6px; font-size: 16px; }
      .empty { color: var(--muted); font-size: 14px; }
      a { color: #7dd3fc; text-decoration: none; }
    </style>
  </head>
  <body>
    <main class="wrap">
      <section class="top">
        <h1>NauticGrid Status</h1>
        <div id="updatedAt" class="muted">Loading status...</div>
        <span id="overall" class="badge">Checking...</span>
      </section>

      <section>
        <h2>Components</h2>
        <div id="components" class="grid"></div>
      </section>

      <section class="incidents">
        <h2>Recent incidents</h2>
        <div id="incidents"></div>
      </section>

      <p class="muted" style="margin-top: 24px;">
        Auto-refresh every 60s · JSON endpoint:
        <a href="./status.json">status.json</a>
      </p>
    </main>

    <script>
      const label = (s) => s === "down" ? "Down" : s === "degraded" ? "Degraded" : "Operational";
      const dotClass = (s) => s === "down" ? "dot-down" : s === "degraded" ? "dot-degraded" : "dot-operational";
      function fmt(ts) {
        if (!ts) return "n/a";
        return new Date(ts).toLocaleString("en-US", { timeZone: "UTC", hour12: false }) + " UTC";
      }
      async function render() {
        const res = await fetch("./status.json", { cache: "no-store" });
        const data = await res.json();
        const overall = data.overall || "operational";
        const overallEl = document.getElementById("overall");
        overallEl.className = `badge ${overall}`;
        overallEl.textContent = label(overall);
        document.getElementById("updatedAt").textContent = `Last updated ${fmt(data.updatedAt)}`;

        const compWrap = document.getElementById("components");
        compWrap.innerHTML = "";
        (data.components || []).forEach((c) => {
          const el = document.createElement("article");
          el.className = "card";
          el.innerHTML = `
            <div class="row">
              <strong>${c.name}</strong>
              <span><span class="dot ${dotClass(c.status)}"></span>${label(c.status)}</span>
            </div>
            <div class="muted" style="margin-top:6px;">${c.description || ""}</div>
            <div class="muted" style="margin-top:6px;">Checked ${fmt(c.lastChecked)}</div>
          `;
          compWrap.appendChild(el);
        });

        const incWrap = document.getElementById("incidents");
        const incidents = data.incidents || [];
        if (!incidents.length) {
          incWrap.innerHTML = '<p class="empty">No incidents reported.</p>';
          return;
        }
        incWrap.innerHTML = "";
        incidents.slice(0, 8).forEach((i) => {
          const el = document.createElement("article");
          el.className = "incident";
          const latest = i.updates && i.updates.length ? i.updates[0].message : "No details";
          el.innerHTML = `
            <h3>${i.title}</h3>
            <div class="muted">${label(i.status)} · ${i.severity || "info"} · ${fmt(i.createdAt)}</div>
            <div style="margin-top:8px;">${latest}</div>
          `;
          incWrap.appendChild(el);
        });
      }
      render().catch((e) => {
        document.getElementById("updatedAt").textContent = `Failed to load status: ${e.message}`;
      });
      setInterval(render, 60000);
    </script>
  </body>
</html>
